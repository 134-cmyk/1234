    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .photo-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1rem;
            }
            .photo-item {
                overflow: hidden;
                border-radius: 0.5rem;
                aspect-ratio: 4/3;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            .photo-item:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0.04);
            }
            .photo-item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.5s ease;
            }
            .photo-item:hover img {
                transform: scale(1.05);
            }
            .tab-active {
                border-bottom: 2px solid #f8b4c4;
                color: #f8b4c4;
            }
            .lightbox {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.9);
                z-index: 1000;
                justify-content: center;
                align-items: center;
            }
            .lightbox.active {
                display: flex;
            }
            .lightbox img {
                max-width: 90%;
                max-height: 90%;
                object-fit: contain;
            }
            .lightbox-close {
                position: absolute;
                top: 20px;
                right: 30px;
                color: white;
                font-size: 40px;
                cursor: pointer;
                transition: color 0.3s ease;
            }
            .lightbox-close:hover {
                color: #f8b4c4;
            }
            /* 密码页面样式 */
            .pwd-wrap {
                position: fixed;
                inset: 0;
                background: #fff;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            .main-wrap {
                display: none;
            }
        }
    </style>

    <script>
        // ========== 密码验证 密码：wwzwsh ==========
        const correctPwd = "wwzwsh";
        function checkPwd(){
            const input = document.getElementById('pwdInput').value.trim();
            const tip = document.getElementById('tipText');
            if(input === correctPwd){
                document.getElementById('pwdBox').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }else{
                tip.classList.remove('hidden');
                document.getElementById('pwdInput').value = '';
            }
        }
        // 回车快捷提交密码
        document.getElementById('pwdInput').addEventListener('keydown',function(e){
            if(e.key === 'Enter') checkPwd();
        });

        // 标签切换功能
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('tab-active'));
                tabContents.forEach(c => c.classList.add('hidden'));
                
                btn.classList.add('tab-active');
                const tabId = btn.getAttribute('data-tab');
                document.getElementById(tabId).classList.remove('hidden');
            });
        });

        // 图片灯箱功能
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');
        const photoItems = document.querySelectorAll('.photo-item img');

        photoItems.forEach(img => {
            img.addEventListener('click', () => {
                lightbox.classList.add('active');
                lightboxImg.src = img.src;
                document.body.style.overflow = 'hidden';
            });
        });

        lightboxClose.addEventListener('click', () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });
